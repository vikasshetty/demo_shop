<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title if title else "Demo Shop" }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container row">
      <a class="brand" href="/">Demo Shop</a>

      <form class="search" action="/" method="get">
        <input name="q" placeholder="Search products..." value="{{ q if q else '' }}" />
        <button type="submit">Search</button>
      </form>

      <nav class="nav">
        <a href="/cart">Cart ({{ cart_count }})</a>
        {% if user %}
          <a href="/orders">Orders</a>
          {% if user.is_admin %}
            <a href="/admin">Admin</a>
          {% endif %}
          <form action="/logout" method="post" class="inline">
            <input type="hidden" name="csrf_token" value="{{ csrf }}" />
            <button type="submit">Logout</button>
          </form>
        {% else %}
          <a href="/login">Login</a>
          <a href="/register">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer container">
    <small>Local demo e-commerce site (no external systems).</small>
  </footer>
</body>
</html>
